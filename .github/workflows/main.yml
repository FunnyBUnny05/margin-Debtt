name: Update Market Data & Deploy

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pandas openpyxl requests beautifulsoup4

      - name: Fetch FINRA margin data
        id: finra_fetch
        run: python scripts/fetch_finra_data.py
        continue-on-error: true

      - name: Fetch AAII allocation data
        id: aaii_fetch
        run: python scripts/fetch_aaii_allocation.py
        continue-on-error: true

      - name: Fetch CBOE Put/Call ratio data
        id: cboe_fetch
        run: python scripts/fetch_cboe_putcall.py
        continue-on-error: true

      - name: Fetch Buffett Indicator data
        id: buffett_fetch
        run: python scripts/fetch_buffett_indicator.py
        continue-on-error: true

      - name: Report data freshness
        if: always()
        run: |
          python -c "
          import json, os
          from datetime import datetime
          for f in ['margin_data.json', 'aaii_allocation_data.json', 'put_call_data.json', 'buffett_indicator_data.json']:
              path = f'public/{f}'
              if os.path.exists(path):
                  data = json.load(open(path))
                  latest = data.get('data', [{}])[-1].get('date', 'unknown')
                  updated = data.get('last_updated', 'unknown')[:10]
                  print(f'{f}: latest_data={latest}, last_updated={updated}')
              else:
                  print(f'{f}: FILE MISSING')
          "

      - name: Warn on fetch failures
        if: steps.finra_fetch.outcome == 'failure' || steps.aaii_fetch.outcome == 'failure' || steps.cboe_fetch.outcome == 'failure' || steps.buffett_fetch.outcome == 'failure'
        run: |
          if [ "${{ steps.finra_fetch.outcome }}" = "failure" ]; then
            echo "::warning::FINRA margin data fetch failed - data may be stale"
          fi
          if [ "${{ steps.aaii_fetch.outcome }}" = "failure" ]; then
            echo "::warning::AAII allocation data fetch failed - data may be stale"
          fi
          if [ "${{ steps.cboe_fetch.outcome }}" = "failure" ]; then
            echo "::warning::CBOE put/call data fetch failed - data may be stale"
          fi
          if [ "${{ steps.buffett_fetch.outcome }}" = "failure" ]; then
            echo "::warning::Buffett Indicator data fetch failed - data may be stale"
          fi

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/margin_data.json public/aaii_allocation_data.json public/put_call_data.json public/buffett_indicator_data.json
          git diff --staged --quiet || git commit -m "Update market data $(date +'%Y-%m-%d')"
          git push

  build-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
